<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Galeria</title>
        <link rel="stylesheet" href="../ccss/estilo.css">
    </head>
    <style>
    body{
        margin:0;
        background: linear-gradient(#c9184a, #880d1e);
        background-repeat: none;
}
    header{
        background:#000;
        padding:20px;
        text-align:center;
}

    nav a{
        color:white;
        margin:0 10px;
        text-decoration:none;
        font-weight:bold;
}
    nav a:hover{
        color:#ff3c8e;
}
    .titulo{
        padding:30px 40px;
        font-size:28px;
}
    .carrusel-contenedor{
        position:relative;
        display:flex;
        align-items:center;
}
    .carrusel{
        display:flex;
        overflow-x:auto;
        scroll-behavior:smooth;
        gap:20px;
        padding:20px 40px;
}
    .carrusel::-webkit-scrollbar{
        display:none;
}
    .card{
        min-width:250px;
        height:350px;
        border-radius:12px;
        overflow:hidden;
        transition:transform .4s;
        cursor:pointer;
}
    .card img{
        width:100%;
        height:100%;
        object-fit:cover;
}
    .card:hover{
        transform:scale(1.15);
        z-index:2;
}
    .boton{
        position:absolute;
        background:rgba(0,0,0,0.7);
        border:none;
        color:white;
        font-size:40px;
        cursor:pointer;
        padding:10px 15px;
        z-index:3;
}
    .izquierda{
        left:0;
}
    .derecha{
        right:0;
}

</style>
   
    <script>
    function moverIzquierda(){
        document.querySelector(".carrusel").scrollBy({
        left:-400,
        behavior:"smooth";)
}
    function moverDerecha(){
        document.querySelector(".carrusel").scrollBy({
        left:400,
        behavior:"smooth"
        });
}
    </script>

    <body>
